name: eflexreverse
description: "Outil de reverse engineering BLE pour eFlexFuel"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Bluetooth Low Energy
  flutter_blue_plus: ^1.32.0

  # Capture d'écran via AccessibilityService Android
  flutter_accessibility_service: ^1.0.0

  # Requêtes HTTP pour l'API Claude
  http: ^1.2.0

  # Gestion d'état
  provider: ^6.1.2

  # Formatage des dates
  intl: ^0.19.0

  # Accès aux répertoires système (exports)
  path_provider: ^2.1.3

  # Partage de fichiers
  share_plus: ^9.0.0

  # Persistance des préférences
  shared_preferences: ^2.2.3

  # Permissions runtime Android (BLE nécessite BLUETOOTH_SCAN/CONNECT sur Android 12+)
  permission_handler: ^11.0.0

  # Sélecteur de fichier natif Android (SAF) — permet de choisir btsnoop_hci.log manuellement
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
